<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Калькулятор подбора</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f7f6f3; --surface: #ffffff; --surface2: #f2f1ee;
    --border: #e4e2dd; --border2: #d0cec8;
    --text: #1c1b18; --text2: #6b6860; --text3: #9c9a94;
    --accent: #4a3fc7; --accent-light: #eeecfb; --accent-text: #3530a0;
    --green: #2d7a4f; --radius: 10px; --radius-sm: 6px;
    --shadow: 0 1px 3px rgba(0,0,0,.06), 0 4px 12px rgba(0,0,0,.04);
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); font-size: 15px; line-height: 1.6; min-height: 100vh; padding: 2rem 1rem 4rem; }
  .page { max-width: 760px; margin: 0 auto; }
  .header { margin-bottom: 1.5rem; }
  .save-indicator { margin-top: 8px; display: inline-flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 500; padding: 4px 10px; border-radius: 20px; transition: background .2s, color .2s; }
  .save-indicator::before { content: ''; width: 7px; height: 7px; border-radius: 50%; background: currentColor; flex-shrink: 0; }
  .save-indicator.si-pending { background: #fef6e7; color: #b7791f; }
  .save-indicator.si-saving  { background: #eef2ff; color: #4f56d3; }
  .save-indicator.si-saved   { background: #ecfdf3; color: #1c8a4e; }
  .save-indicator.si-error   { background: #fdf0ee; color: #c0392b; }
  .header-eyebrow { font-size: 11px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; color: var(--accent); margin-bottom: .5rem; display: inline-block; text-decoration: none; cursor: pointer; }
  .header-eyebrow:hover { text-decoration: underline; }
  .header-eyebrow.disabled { cursor: default; opacity: .55; pointer-events: none; text-transform: none; letter-spacing: normal; font-weight: 500; }
  .header h1 { font-size: 26px; font-weight: 600; color: var(--text); letter-spacing: -.01em; }

  /* Tabs */
  .tabs { display: flex; gap: 4px; background: var(--surface2); border-radius: var(--radius-sm); padding: 4px; margin-bottom: 1.25rem; }
  .tab { flex: 1; padding: 8px 12px; font-size: 14px; font-weight: 500; font-family: inherit; background: transparent; border: none; border-radius: 6px; cursor: pointer; color: var(--text2); transition: background .15s, color .15s; text-align: center; }
  .tab.tab-vacancies { color: var(--accent); }
  .tab.tab-vacancies.active { background: var(--accent); color: #fff; box-shadow: var(--shadow); }
  .vac-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); gap: 1rem; margin-bottom: .5rem; }
  .vac-card { position: relative; min-height: 172px; border-radius: 14px; padding: 0; display: flex; flex-direction: column; cursor: pointer; background: var(--surface); border: 1px solid var(--border); transition: box-shadow .18s, border-color .18s, transform .12s; overflow: hidden; }
  .vac-card::before { display: none; }
  .vac-card:hover { box-shadow: 0 8px 24px rgba(74,63,199,.12); border-color: #c9c4f0; transform: translateY(-3px); }
  .vac-card-body { padding: 1rem 1rem .7rem; display: flex; flex-direction: column; flex: 1; }
  .vac-card-head { display: flex; align-items: flex-start; gap: 9px; margin-bottom: .8rem; padding-right: 26px; }
  .vac-card-name { font-size: 14.5px; font-weight: 650; color: var(--text); line-height: 1.3; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; flex: 1; padding-top: 1px; }
  .vac-card-info-wrap { display: flex; flex-direction: column; gap: .55rem; flex: 1; }
  .vac-card-info { display: flex; flex-direction: column; gap: 2px; padding: .55rem .65rem; border-radius: 9px; background: var(--surface2); }
  .vac-card-info.is-point-max { background: #f0faf4; }
  .vac-card-info.is-point-mid { background: #eff6ff; }
  .vac-card-info.is-point-min { background: #f5f3ff; }
  .vac-card-info.is-mass-search { background: #f5f3ff; }
  .vac-card-info.is-mass-full   { background: #f0faf4; }
  .vac-card-info-head { display: flex; align-items: center; justify-content: space-between; gap: 6px; min-height: 18px; }
  .vac-card-info-type { font-size: 9.5px; font-weight: 800; text-transform: uppercase; letter-spacing: .05em; }
  .vac-card-info.is-point-max .vac-card-info-type { color: #065f46; }
  .vac-card-info.is-point-mid .vac-card-info-type { color: #1e40af; }
  .vac-card-info.is-point-min .vac-card-info-type { color: #5b21b6; }
  .vac-card-info.is-mass-search .vac-card-info-type { color: #5b21b6; }
  .vac-card-info.is-mass-full   .vac-card-info-type { color: #065f46; }
  .vac-card-info-meta { font-size: 12.5px; font-weight: 700; color: var(--text2); white-space: nowrap; }
  .vac-card-info-sub { font-size: 10.5px; color: var(--text2); font-weight: 500; line-height: 1.25; }
  .vac-card-info-val { font-size: 17px; font-weight: 750; color: var(--text); letter-spacing: -.02em; margin-top: 1px; }
  .vac-card-empty { font-size: 12px; color: var(--text3); font-style: italic; padding: .6rem .2rem; text-align: center; background: var(--surface2); border-radius: 9px; }
  .vac-card-foot { padding: .5rem 1rem; border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; gap: 6px; background: #fcfcfb; }
  .vac-card-date { font-size: 10px; color: var(--text3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .vac-card-open { font-size: 11px; font-weight: 700; color: var(--accent); white-space: nowrap; opacity: 0; transform: translateX(-3px); transition: opacity .15s, transform .15s; }
  .vac-card:hover .vac-card-open { opacity: 1; transform: translateX(0); }
  .vac-card-del { position: absolute; top: 10px; right: 10px; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; border-radius: 50%; background: rgba(255,255,255,.95); color: var(--text3); font-size: 16px; line-height: 1; border: 1px solid var(--border); opacity: 0; transition: opacity .15s, background .15s, color .15s; z-index: 3; }
  .vac-card:hover .vac-card-del { opacity: 1; }
  .vac-card-del:hover { background: #fdf0ee; color: #c0392b; border-color: #f5c6c0; }
  .vac-card-check { flex-shrink: 0; width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; cursor: pointer; border-radius: 6px; border: 1.5px solid var(--border2); background: var(--surface); transition: border-color .15s, background .15s; }
  .vac-card-check:hover { border-color: var(--accent); }
  .vac-card-check input { width: 13px; height: 13px; cursor: pointer; accent-color: var(--accent); margin: 0; opacity: 0; position: absolute; }
  .vac-card-check::after { content: ''; width: 10px; height: 10px; border-radius: 2px; background: transparent; transition: background .15s; }
  .vac-card.is-selected { background: var(--surface) !important; border-color: #22c55e; border-width: 2.5px; box-shadow: none; }
  .vac-card.is-selected .vac-card-check { background: #22c55e; border-color: #16a34a; }
  .vac-card.is-selected .vac-card-check::after { background: #fff; -webkit-mask: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><path d='M13 4L6 11 3 8' stroke='black' stroke-width='2.5' fill='none' stroke-linecap='round' stroke-linejoin='round'/></svg>") center/contain no-repeat; mask: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><path d='M13 4L6 11 3 8' stroke='black' stroke-width='2.5' fill='none' stroke-linecap='round' stroke-linejoin='round'/></svg>") center/contain no-repeat; border-radius: 0; }
  .vac-card.is-selected .vac-card-name { color: var(--text); }





  .vac-card.is-selected .vac-card-date { color: var(--text3); }
  .vac-card.is-selected .vac-card-foot { background: rgba(255,255,255,.4); border-top-color: rgba(93,79,199,.2); }
  .vac-card.is-selected .vac-card-open { color: var(--accent); opacity: 1; transform: translateX(0); }
  .vac-card.is-selected .vac-card-del { opacity: 1; background: rgba(255,255,255,.9); color: var(--text3); border-color: rgba(255,255,255,.5); }
  .vac-card.is-selected .vac-card-del:hover { background: #fdf0ee; color: #c0392b; }
  .vac-card-top-stripe { display: none !important; }
  .vac-add { background: var(--surface2); border: 2px dashed var(--border2); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; min-height: 172px; transition: border-color .18s, background .18s, transform .12s; }
  .vac-add::before { display: none; }
  .vac-add:hover { border-color: var(--accent); background: var(--accent-light); transform: translateY(-3px); }
  .vac-add-plus { font-size: 30px; font-weight: 300; color: var(--text3); line-height: 1; width: 54px; height: 54px; border-radius: 50%; background: var(--surface); display: flex; align-items: center; justify-content: center; box-shadow: var(--shadow); transition: color .18s, transform .18s; }
  .vac-add:hover .vac-add-plus { color: var(--accent); transform: scale(1.05); }
  .vac-add-label { font-size: 12.5px; font-weight: 650; color: var(--text2); }
  .vac-add:hover .vac-add-label { color: var(--accent); }
  .vac-empty-hint { text-align: center; color: var(--text3); font-size: 13px; padding: 1.5rem 0; }
  .tab.active { background: var(--surface); color: var(--text); box-shadow: var(--shadow); }

  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.25rem 1.5rem; margin-bottom: 1rem; box-shadow: var(--shadow); }
  .card-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .07em; color: var(--text3); margin-bottom: 1rem; padding-bottom: .6rem; border-bottom: 1px solid var(--border); }
  .card-title-wrap { display: flex; align-items: center; gap: 6px; margin-bottom: 1rem; padding-bottom: .6rem; border-bottom: 1px solid var(--border); }
  .card-title-wrap .card-title { margin: 0; padding: 0; border: none; }

  .exp-section { margin-bottom: 1.25rem; }
  .exp-divider { border: none; border-top: 1px solid var(--border); margin: 0 -1.5rem 1.25rem; }
  .field-wrap:last-child { margin-bottom: 0; }
  .field-wrap label { display: block; font-size: 13px; color: var(--text2); margin-bottom: 5px; }
  .field-hint { font-size: 11.5px; color: var(--text3); margin-top: 4px; line-height: 1.4; }
  .field-wrap input, .field-wrap select, .field-wrap textarea { width: 100%; padding: 0 12px; font-size: 14px; font-family: inherit; border: 1px solid var(--border2); border-radius: var(--radius-sm); background: var(--surface); color: var(--text); outline: none; transition: border-color .15s; }
  .field-wrap input, .field-wrap select { height: 40px; }
  .field-wrap textarea { padding: 10px 12px; height: 80px; resize: vertical; line-height: 1.5; }
  .field-wrap input:focus, .field-wrap select:focus, .field-wrap textarea:focus { border-color: var(--accent); }
  .field-wrap input[type=number] { -moz-appearance: textfield; }
  .field-wrap input[type=number]::-webkit-outer-spin-button,
  .field-wrap input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }

  /* Компания */
  .company-row { display: grid; grid-template-columns: 160px 1fr; gap: 8px; }
  .company-result { margin-top: 6px; font-size: 13px; font-weight: 600; color: var(--text); background: var(--surface2); border-radius: var(--radius-sm); padding: 8px 12px; min-height: 36px; display: flex; align-items: center; }

  /* ЗП */
  .salary-entries { display: flex; flex-direction: column; gap: 0; margin-bottom: 10px; }
  .salary-entry { position: relative; padding: 12px 30px 12px 0; border-top: 1px solid var(--border); }
  .salary-entry:first-child { border-top: none; padding-top: 0; }
  .salary-inner-amount { display: grid; grid-template-columns: 1fr 110px; gap: 8px; margin-bottom: 8px; }
  .salary-inner-amount input { height: 40px; font-size: 14px; font-weight: 400; font-family: inherit; border: 1px solid #f0e4a0; border-radius: var(--radius-sm); padding: 0 12px; outline: none; background: #fffdf0; color: var(--text); width: 100%; transition: border-color .15s, background .15s; }
  .salary-inner-amount input:focus { border-color: var(--accent); background: var(--surface); }
  .salary-inner-amount input::placeholder { color: var(--text3); }
  .salary-inner-amount select { height: 40px; font-size: 13px; font-family: inherit; border: 1px solid var(--border2); border-radius: var(--radius-sm); padding: 0 8px; outline: none; background: var(--surface); color: var(--text2); cursor: pointer; width: 100%; transition: border-color .15s, background .15s; }
  .salary-inner-note textarea { width: 100%; font-size: 13px; font-family: inherit; border: 1px solid var(--border2); border-radius: var(--radius-sm); padding: 8px 12px; background: var(--surface2); color: var(--text3); resize: none; height: 36px; line-height: 1.5; outline: none; display: block; box-sizing: border-box; transition: border-color .15s, background .15s, color .15s; }
  .salary-inner-note textarea::placeholder { color: var(--text3); }
  .salary-inner-note textarea:focus { color: var(--text2); background: var(--surface); border-color: var(--accent); }
  .salary-inner-amount input.salary-amount-filled { border-color: #a8d9bc; background: #f0faf4; }
  .salary-inner-amount select.salary-cur-filled { border-color: #a8d9bc; background: #f0faf4; color: var(--text); }
  .salary-inner-note textarea.salary-note-filled { color: var(--text); background: #f0faf4; border-color: #a8d9bc; }
  .btn-remove-salary { position: absolute; top: 14px; right: 0; width: 22px; height: 22px; border-radius: 50%; border: none; background: var(--surface2); color: var(--text3); font-size: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center; line-height: 1; transition: background .15s, color .15s; }
  .salary-entry:first-child .btn-remove-salary { top: 2px; }
  .btn-remove-salary:hover { background: #fee2e2; color: #991b1b; }
  .btn-add-salary { display: flex; align-items: center; justify-content: center; gap: 6px; padding: 9px 14px; font-size: 13px; font-family: inherit; background: var(--surface); color: var(--text2); border: 1px dashed var(--border2); border-radius: var(--radius-sm); cursor: pointer; transition: background .15s, border-color .15s, color .15s; width: 100%; }
  .btn-add-salary:hover { background: var(--accent-light); border-color: var(--accent); color: var(--accent); }

  /* Filled/empty field states */
  .field-wrap input.filled, .field-wrap select.filled, .field-wrap textarea.filled { border-color: #a8d9bc; background: #f8fdfb; }
  .field-wrap input.field-empty, .field-wrap select.field-empty, .field-wrap textarea.field-empty { border-color: #f0e4a0; background: #fffdf0; }
  .company-result.filled { border: 1.5px solid #a8d9bc; background: #f0faf4; color: var(--text); font-weight: 600; }
  .salary-amount-filled { border-color: #a8d9bc !important; background: #f8fdfb !important; }
  .salary-note { color: var(--text3); }
  .salary-note:focus { color: var(--text2); }
  .salary-note.salary-note-filled { color: var(--text); background: #f8fdfb; border-radius: 4px; padding: 2px 4px; margin: -2px -4px; border: 1px solid #a8d9bc; }
  .ip-error { font-size: 12px; color: #c0392b; margin-top: 4px; display: none; }
  .ip-error.visible { display: block; }
  /* company input — no green highlight */
  #exp-co-name.filled, #exp-co-name:focus { border-color: var(--border2); background: var(--surface); }

  /* Конкуренция */
  .competition-badge { display: inline-block; font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 20px; margin-top: 5px; }
  .comp-low    { background: #d1fae5; color: #065f46; }
  .comp-mid    { background: #fef3c7; color: #92400e; }
  .comp-high   { background: #fee2e2; color: #991b1b; }
  .comp-xhigh  { background: #fce7f3; color: #9d174d; }

  .row-counter { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
  .row-counter button { width: 18px; height: 18px; border-radius: 50%; border: 1px solid var(--border2); background: var(--surface2); color: var(--text); font-size: 13px; line-height: 1; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background .15s; }
  .row-counter button:hover { background: var(--accent-light); border-color: var(--accent); }
  .row-counter button:disabled { opacity: .3; cursor: default; }
  .row-counter span { font-size: 13px; font-weight: 500; min-width: 14px; text-align: center; color: var(--text); }
  .row { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border); }
  .row:last-child { border-bottom: none; }
  .row-check { width: 18px; height: 18px; flex-shrink: 0; accent-color: #2d7a4f; cursor: pointer; }
  .row-name { flex: 1; font-size: 14px; color: var(--text); cursor: pointer; user-select: none; }
  .row-price { font-size: 13px; color: var(--text2); white-space: nowrap; min-width: 80px; text-align: right; }
  .row-price.free { color: var(--green); }

  .tip-btn { width: 18px; height: 18px; border-radius: 50%; border: 1.5px solid var(--border2); background: var(--surface2); color: var(--text3); font-size: 11px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: border-color .15s, color .15s; line-height: 1; }
  .tip-btn:hover { border-color: var(--accent); color: var(--accent); }
  .tip-popup { display: none; position: absolute; z-index: 100; background: var(--text); color: #fff; font-size: 13px; line-height: 1.55; padding: 10px 13px; border-radius: var(--radius-sm); max-width: 320px; box-shadow: 0 4px 16px rgba(0,0,0,.18); pointer-events: none; white-space: pre-line; right: 0; top: 28px; left: auto; }
  .tip-popup.visible { display: block; }
  .tip-popup::before { content: ''; position: absolute; top: -5px; right: 8px; left: auto; width: 10px; height: 10px; background: var(--text); transform: rotate(45deg); border-radius: 2px; }
  .row-wrap { position: relative; }

  .total-box { background: #f0faf4; border: 1.5px solid #a8d9bc; border-radius: var(--radius-sm); padding: 1rem 1.25rem; display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.25rem; }
  .total-box-label { font-size: 13px; color: #065f46; font-weight: 500; }
  .total-box-value { font-size: 24px; font-weight: 700; color: #065f46; }

  .smeta-item { display: flex; justify-content: space-between; align-items: baseline; padding: 5px 0; border-bottom: 1px solid var(--border); font-size: 13.5px; }
  .smeta-item:last-child { border-bottom: none; padding-bottom: 0; }

  .staff-banner { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: .85rem 1rem; margin-bottom: 1.1rem; display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
  .staff-banner-text { min-width: 180px; }
  .staff-banner-label { display: block; font-size: 13px; font-weight: 600; color: var(--text); cursor: pointer; }
  .staff-banner-hint { font-size: 11.5px; color: var(--text3); margin-top: 2px; }
  .staff-banner input { width: 70px; height: 40px; font-size: 15px; font-weight: 600; text-align: center; font-family: inherit; border: 1px solid var(--border2); border-radius: var(--radius-sm); background: var(--surface); color: var(--text); outline: none; transition: border-color .15s; flex-shrink: 0; }
  .staff-banner input:focus { border-color: var(--accent); }

  .btn-smeta { display: inline-flex; align-items: center; gap: 7px; padding: 9px 18px; font-size: 14px; font-weight: 500; font-family: inherit; background: var(--surface); color: var(--text); border: 1px solid var(--border2); border-radius: var(--radius-sm); cursor: pointer; transition: background .15s; }
  .btn-smeta:hover { background: var(--surface2); }

  /* Кастомные поля */
  .custom-row { margin-top: 8px; padding-top: 0; bord
